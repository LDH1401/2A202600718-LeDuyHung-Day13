service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: User-visible /chat requests should keep p95 latency below 3 seconds.
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Failed requests should remain below 2 percent over the rolling window.
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Demo budget guardrail for token spend and cost-spike incidents.
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: Heuristic quality proxy should stay at or above 0.75 for normal traffic.
